# ─── Admin app (admin-agricura subfolder) ────────────────────────────
[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Let Netlify Functions handle /api/* paths
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# React SPA — redirect all other routes to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
